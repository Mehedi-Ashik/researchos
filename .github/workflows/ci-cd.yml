name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ==========================================
  # Continuous Integration (Lint, Typecheck & Test)
  # ==========================================
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Node.js Environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Install Node Dependencies & Run Tests/Linter
      - name: Install Frontend Dependencies
        run: npm ci

      - name: Run TypeScript Type Check (Linter)
        run: npm run lint

      - name: Run Frontend Tests (Vitest)
        run: npm run test

      # Setup Python Environment for Backend checks
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r fastapi-backend/requirements.txt

  # ==========================================
  # Continuous Deployment (Docker Build & Cloud Run Push)
  # ==========================================
  deploy-cloud-run:
    needs: test-and-lint
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Authenticate with Google Cloud (Optional/Configure as secrets)
      # Setup GCP credentials using Service Account JSON secret
      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          token_format: 'access_token'

      # Configure Docker to use gcloud command-line tool as credential helper
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # Build and Push Docker Container to Artifact Registry
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/researchos/app:latest
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/researchos/app:${{ github.sha }}

      # Deploy the image to Cloud Run (Fully Serverless - free tier included)
      - name: Deploy to Google Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: researchos
          image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/researchos/app:latest
          region: us-central1
          env_vars: |
            NODE_ENV=production
            PORT=3000
            POSTGRES_SERVER=${{ secrets.PROD_POSTGRES_SERVER }}
            POSTGRES_USER=${{ secrets.PROD_POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.PROD_POSTGRES_DB }}
            SECRET_KEY=${{ secrets.PROD_SECRET_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
